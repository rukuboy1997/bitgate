kind = "web"
previewPath = "/"
title = "BitGate"
version = "1.0.0"
id = "artifacts/bitgate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19810
name = "web"
paths = ["/"]

[services.development]
run = "npm --prefix /home/runner/workspace/bitgate run dev"

[services.env]
PORT = "19810"
BASE_PATH = "/"

[services.production]
build = ["npm", "--prefix", "/home/runner/workspace/bitgate", "run", "build"]
publicDir = "bitgate/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
