kind = "web"
previewPath = "/"
title = "BitGate"
version = "1.0.0"
id = "artifacts/bitgate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19810
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/bitgate run dev"

[services.env]
PORT = "19810"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/bitgate", "run", "build"]
publicDir = "artifacts/bitgate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
